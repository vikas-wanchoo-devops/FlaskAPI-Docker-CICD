name: CI/CD Pipeline

on:
  push:
    branches:
      - develop

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ✅ Step 1: Checkout the code
      - name: Checkout repository
        uses: actions/checkout@v3

      # ✅ Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # ✅ Step 3: Install dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ✅ Step 4: Run tests (optional)
      - name: Run tests
        run: pytest || echo "No tests found"

      # ✅ Step 5: Log in to Docker Hub
      - name: Docker login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ✅ Step 6: Build Docker image
      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/flask-api:${{ github.sha }} .

      # ✅ Step 7: Push Docker image
      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/flask-api:${{ github.sha }}

      # ✅ Step 8: Run container (verification)
      - name: Run container
        run: docker run -d -p 5000:5000 --name flask-api ${{ secrets.DOCKER_USERNAME }}/flask-api:${{ github.sha }}

      # ✅ Step 9: Cleanup
      - name: Cleanup
        run: docker stop flask-api && docker rm flask-api
